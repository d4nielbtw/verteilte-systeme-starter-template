<!DOCTYPE html>
<div id="loginScreen">
  <div class="card">
    <h1>Anmelden</h1>
    <p class="sub">Bitte gib deine Zugangsdaten ein.</p>

    <div class="field">
      <label for="user">Benutzername</label>
      <input type="text" id="user" placeholder="Benutzername" autocomplete="username"/>
    </div>
    <div class="field">
      <label for="pass">Passwort</label>
      <input type="password" id="pass" placeholder="Passwort" autocomplete="current-password"/>
    </div>

    <p class="error" id="err">Benutzername oder Passwort falsch.</p>

    <button class="btn" onclick="login()">Anmelden</button>
  </div>
</div>

<!-- HAUPTSEITE – hier kannst du alles bearbeiten -->
<div id="mainPage">

  <!-- ✏️ Dein Inhalt kommt hier rein -->

</div>

<script>
  // 🔑 Zugangsdaten hier ändern
  const USER = 'admin';
  const PASS = 'passwort123';

  function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value;
    const err = document.getElementById('err');

    if (u === USER && p === PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainPage').style.display = 'block';
    } else {
      err.classList.add('show');
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
